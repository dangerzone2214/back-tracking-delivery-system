[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[redirects]]
  from = "/"
  to = "/delivery-tracker.html"
  status = 200

[[redirects]]
  from = "/agent"
  to = "/agent.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/delivery-tracker.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/delivery-tracker.html"
  status = 200
